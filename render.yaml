# Render Blueprint — free, no card. Deploys the backend from the root Dockerfile.
# NOTE: Render's free web service is 512 MB RAM, so DOCLING_ENABLED is forced to
# "false" here — PDF ingestion uses the low-memory text-only extractor (tables/
# layout lost, but ingestion works and won't OOM). Free services also sleep when
# idle (~30-60s cold start on wake). For full Docling + no cold start you need a
# real VM (see DEPLOY.md, Oracle path) or a paid plan with >=2 GB RAM.
services:
  - type: web
    name: atlas-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DOCLING_ENABLED
        value: "false"
      - key: EMBEDDING_DIM
        value: "2048"
      - key: PORT
        value: "7860"
      # Set these in the Render dashboard (marked sync:false = not stored in git):
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
